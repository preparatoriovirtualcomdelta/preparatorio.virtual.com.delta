<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - DELT∆</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:100px;">

  <h2>🔐 Login Admin</h2>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Senha"><br><br>

  <button onclick="login()">Entrar</button>

  <p id="msg" style="color:red;"></p>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
      authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
      projectId: "preparatoriovirtualcomdelta",
      storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
      messagingSenderId: "554101533814",
      appId: "1:554101533814:web:ed46583d92f4e14679c357"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();

    function login(){

      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(user => {

          // 🔐 VERIFICA SE É ADMIN
          if(email === "admin@delta.com") {

            // guarda sessão admin
            localStorage.setItem("admin", "true");

            window.location.href = "admin.html";

          } else {

            auth.signOut();
            document.getElementById("msg").innerText = "❌ Não é admin";

          }

        })
        .catch(err => {
          document.getElementById("msg").innerText = err.message;
        });

    }
  </script>

</body>
</html>
