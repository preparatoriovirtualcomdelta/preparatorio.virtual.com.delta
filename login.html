<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOGIN - PREPARATÓRIO DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ZOOM MAIOR DA TELA */
.box{
background:rgba(255,255,255,0.08);
padding:90px 60px;
border-radius:28px;
width:520px;
box-shadow:0 30px 100px rgba(0,0,0,0.8);
backdrop-filter:blur(15px);
text-align:center;
transform:scale(1.1); /* 🔥 ZOOM MAIOR */
animation:fadeIn 0.8s ease;
}

h2{
font-size:38px;
margin-bottom:30px;
letter-spacing:1px;
}

/* INPUTS */
input{
padding:18px;
margin:10px 0;
width:100%;
border-radius:12px;
border:none;
outline:none;
font-size:16px;
background:#f1f5f9;
color:black;
}

/* PASSWORD BOX */
.passwordBox{
position:relative;
}

.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
color:#333;
}

/* BOTÃO */
button{
padding:18px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
font-size:18px;
font-weight:bold;
transition:0.3s;
margin-top:10px;
}

button:hover{
transform:scale(1.05);
}

.error{
color:#ff4d4d;
margin-top:15px;
font-size:14px;
font-weight:bold;
}

/* ANIMAÇÃO */
@keyframes fadeIn{
from{opacity:0; transform:translateY(30px) scale(0.9);}
to{opacity:1; transform:translateY(0) scale(1);}
}

/* RESPONSIVO */
@media(max-width:600px){
.box{
width:90%;
transform:scale(1);
padding:50px 25px;
}
}
</style>
</head>

<body>

<div class="box">

<h2>Login do Aluno</h2>

<input id="email" placeholder="Email"><br>

<div class="passwordBox">
<input id="senha" type="password" placeholder="Senha">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button onclick="login()">Entrar</button>

<div class="error" id="erro"></div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuZ2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
  storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
  messagingSenderId: "554101533814",
  appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const area = params.get("area");

window.login = function(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

document.getElementById("erro").innerText = "";

signInWithEmailAndPassword(auth, email, senha)
.then(async (userCredential) => {

const user = userCredential.user;

const ref = doc(db, "users", user.uid);
const snap = await getDoc(ref);

if (!snap.exists()) {
document.getElementById("erro").innerText = "Conta não existe no sistema do admin";
return;
}

if (snap.data().approved !== true) {
document.getElementById("erro").innerText = "Aguardando aprovação do admin";
return;
}

localStorage.setItem("user", email);

window.location.href = "aulas.html?area=" + area;

})
.catch(() => {
document.getElementById("erro").innerText = "Email ou senha inválidos";
});

}

/* 👁 VER / OCULTAR SENHA */
window.togglePassword = function(){
const senha = document.getElementById("senha");
senha.type = senha.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
