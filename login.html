<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOGIN - DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:rgba(255,255,255,0.08);
padding:70px;
border-radius:25px;
width:420px;
text-align:center;
}

input,select{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;
}

.passwordBox{
position:relative;
}

.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:black;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="email" placeholder="Email">

<div class="passwordBox">
<input id="senha" type="password" placeholder="Senha">
<span class="eye" onclick="toggleSenha()">👁</span>
</div>

<select id="area">
<option value="">Seleciona área</option>
<option value="medicina geral">Medicina Geral</option>
<option value="enfermagem">Enfermagem</option>
<option value="farmacia">Farmácia</option>
<option value="analises clinicas">Análises Clínicas</option>
<option value="fisioterapia">Fisioterapia</option>
<option value="nutrição e dietética">Nutrição e Dietética</option>
<option value="cardiopneumologia">Cardiopneumologia</option>
<option value="medicina dentária">Medicina Dentária</option>
</select>

<button onclick="login()">Entrar</button>

<div class="error" id="erro"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuZ2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = function(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;
const area = document.getElementById("area").value;

if(!email || !senha || !area){
document.getElementById("erro").innerText = "Preenche todos os campos";
return;
}

signInWithEmailAndPassword(auth, email, senha)
.then(async (userCredential) => {

const user = userCredential.user;

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
document.getElementById("erro").innerText = "Conta não existe no sistema";
return;
}

if(snap.data().approved !== true){
document.getElementById("erro").innerText = "Aguardando aprovação";
return;
}

localStorage.setItem("user", email);
localStorage.setItem("area", area);

window.location.href = "aulas.html";

})
.catch((error)=>{
document.getElementById("erro").innerText = "Email ou senha inválidos";
console.log(error.code);
});

}

// 👁 mostrar/ocultar senha
window.toggleSenha = function(){
const senha = document.getElementById("senha");
senha.type = senha.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
