<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOGIN - PREPARATÓRIO DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:rgba(255,255,255,0.08);
padding:90px 60px;
border-radius:28px;
width:520px;
box-shadow:0 30px 100px rgba(0,0,0,0.8);
backdrop-filter:blur(15px);
text-align:center;
transform:scale(1.1);
}

h2{
font-size:38px;
margin-bottom:30px;
}

input{
padding:18px;
margin:10px 0;
width:100%;
border-radius:12px;
border:none;
outline:none;
font-size:16px;
background:#f1f5f9;
color:black;
}

select{
padding:18px;
margin:10px 0;
width:100%;
border-radius:12px;
border:none;
font-size:16px;
}

button{
padding:18px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
font-size:18px;
font-weight:bold;
margin-top:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.error{
color:#ff4d4d;
margin-top:15px;
font-size:14px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>Login do Aluno</h2>

<input id="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<!-- ÁREA DO CURSO -->
<select id="area">
<option value="">Seleciona a área</option>
<option value="medicina">Medicina</option>
<option value="enfermagem">Enfermagem</option>
<option value="farmacia">Farmácia</option>
<option value="direito">Direito</option>
<option value="engenharia">Engenharia</option>
</select>

<button onclick="login()">Entrar</button>

<div class="error" id="erro"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuZ2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
  storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
  messagingSenderId: "554101533814",
  appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = function(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;
const area = document.getElementById("area").value;

document.getElementById("erro").innerText = "";

// validação básica
if(!email || !senha || !area){
document.getElementById("erro").innerText = "Preenche todos os campos";
return;
}

signInWithEmailAndPassword(auth, email, senha)
.then(async (userCredential) => {

const user = userCredential.user;

const ref = doc(db, "users", user.uid);
const snap = await getDoc(ref);

if (!snap.exists()) {
document.getElementById("erro").innerText = "Conta não existe no sistema";
return;
}

if (snap.data().approved !== true) {
document.getElementById("erro").innerText = "Aguardando aprovação do admin";
return;
}

// GUARDA DADOS DO ALUNO
localStorage.setItem("user", email);
localStorage.setItem("area", area);

window.location.href = "aulas.html";

})
.catch(() => {
document.getElementById("erro").innerText = "Email ou senha inválidos";
});

}

</script>

</body>
</html>
