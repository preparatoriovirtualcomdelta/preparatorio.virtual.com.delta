<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOGIN - DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:rgba(255,255,255,0.08);
padding:60px;
border-radius:25px;
width:420px;
text-align:center;
}

input,select{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;
}

.passwordBox{
position:relative;
}

.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.loginBtn{background:#22c55e;}
.registerBtn{background:#3b82f6;}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.error{
color:red;
margin-top:10px;
}

#loading{
display:none;
margin-top:15px;
}

.spinner{
width:30px;
height:30px;
border:4px solid #ccc;
border-top:4px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="email" placeholder="Email">

<div class="passwordBox">
<input id="senha" type="password" placeholder="Senha">
<span class="eye" onclick="toggleSenha()">👁</span>
</div>

<select id="area">
<option value="">Seleciona área</option>
<option value="medicina geral">Medicina Geral</option>
<option value="enfermagem">Enfermagem</option>
<option value="farmacia">Farmácia</option>
<option value="analises clinicas">Análises Clínicas</option>
<option value="fisioterapia">Fisioterapia</option>
<option value="nutrição e dietética">Nutrição e Dietética</option>
<option value="cardiopneumologia">Cardiopneumologia</option>
<option value="medicina dentária">Medicina Dentária</option>
</select>

<button id="btnLogin" class="loginBtn" onclick="login()">Entrar</button>
<button id="btnRegister" class="registerBtn" onclick="register()">Criar conta</button>

<div id="loading">
<div class="spinner"></div>
<p>A carregar...</p>
</div>

<div class="error" id="erro"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDoF_h5rVPvVFsHJNcXdWO1gkzwdm65pZQ",
  authDomain: "preparatoriovirtualcomde-71e23.firebaseapp.com",
  projectId: "preparatoriovirtualcomde-71e23",
  storageBucket: "preparatoriovirtualcomde-71e23.firebasestorage.app",
  messagingSenderId: "738659946479",
  appId: "1:738659946479:web:882735f1e23b5d0764b01a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const erro = document.getElementById("erro");
const loading = document.getElementById("loading");
const btnLogin = document.getElementById("btnLogin");
const btnRegister = document.getElementById("btnRegister");

// 🔥 pegar área do index
const params = new URLSearchParams(window.location.search);
const areaURL = params.get("area");
if(areaURL){
document.getElementById("area").value = areaURL;
}

function showLoading(){
loading.style.display = "block";
btnLogin.disabled = true;
btnRegister.disabled = true;
}

function hideLoading(){
loading.style.display = "none";
btnLogin.disabled = false;
btnRegister.disabled = false;
}

function validar(email, senha, area){
if(!email || !senha || !area){
erro.innerText = "Preenche todos os campos";
return false;
}
return true;
}

// 🔐 LOGIN
window.login = async function(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;
const area = document.getElementById("area").value;

erro.innerText = "";

if(!validar(email, senha, area)) return;

showLoading();

try {

const userCredential = await signInWithEmailAndPassword(auth, email, senha);

// 🔥 GARANTE QUE EXISTE NO FIRESTORE
await garantirFirestore(userCredential.user, email, area);

await verificar(userCredential.user, email);

} catch(error){
erro.innerText = "Email ou senha inválidos";
} finally {
hideLoading();
}

}

// 🆕 REGISTO
window.register = async function(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;
const area = document.getElementById("area").value;

erro.innerText = "";

if(!validar(email, senha, area)) return;

showLoading();

try {

const newUser = await createUserWithEmailAndPassword(auth, email, senha);

await setDoc(doc(db,"users",newUser.user.uid),{
uid: newUser.user.uid,
email: email,
area: area,
approved: false,
createdAt: Date.now()
});

erro.style.color = "lightgreen";
erro.innerText = "Conta criada! Aguarde aprovação do admin";

} catch(error){
erro.innerText = error.message;
} finally {
hideLoading();
}

}

// 🔥 GARANTE DOCUMENTO NO FIRESTORE
async function garantirFirestore(user, email, area){

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
uid: user.uid,
email: email,
area: area,
approved: false,
createdAt: Date.now()
});
}

}

// 🔎 VERIFICAÇÃO
async function verificar(user, email){

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
erro.innerText = "Erro no sistema";
return;
}

if(snap.data().approved !== true){
erro.innerText = "Aguardando aprovação do admin";
return;
}

localStorage.setItem("user", email);
localStorage.setItem("area", snap.data().area);

window.location.href = "aulas.html";
}

// 👁 senha
window.toggleSenha = function(){
const senha = document.getElementById("senha");
senha.type = senha.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
