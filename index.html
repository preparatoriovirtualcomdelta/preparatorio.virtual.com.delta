<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>PREPARATÓRIO VIRTUAL COM DELT∆</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
}

.container {
  background: white;
  width: 80%;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
  margin-top: 50px;
  box-shadow: 0px 0px 10px #aaa;
}

input, select {
  padding: 10px;
  width: 80%;
  margin: 10px;
}

button {
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AQUI",
  authDomain: "AQUI",
  projectId: "AQUI",
  appId: "AQUI"
};

firebase.initializeApp(firebaseConfig);

function login() {
  let email = document.getElementById("nome").value;
  let senha = document.getElementById("senha").value;

  firebase.auth().signInWithEmailAndPassword(email, senha)
  .then(() => {
    alert("Entrou ✔");
  })
  .catch(() => {
    alert("Erro no login ❌");
  });
}
                                                                          </script>
<body>

<div class="container">

<h1>PREPARATÓRIO VIRTUAL COM DELT∆</h1>

<p>Valor: 5.000 KZ</p>

<input id="nome" placeholder="Nome completo"><br>

<input id="senha" type="password" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

<p id="msg"></p>

</div>

<script>
function login() {
  let senha = document.getElementById("senha").value;

  let senhaSecreta = "12345678910xxxDelt∆xxxLoginwwwPermissãoFormulas17$";

  if (senha === senhaSecreta) {
    document.getElementById("msg").innerHTML = "Acesso permitido ✔";
  } else {
    document.getElementById("msg").innerHTML = "Senha incorreta ❌";
  }
}
</script>

</body>
