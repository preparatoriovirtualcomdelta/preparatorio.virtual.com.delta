<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>DELT∆ Preparatório</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(120deg,#0f172a,#1e293b);
  color:white;
}

.container{
  max-width:400px;
  margin:80px auto;
  background:#111827;
  padding:30px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
  font-size:28px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

.menu{
  background:#0f172a;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.price{
  color:#fbbf24;
}
</style>

</head>

<body>

<div class="menu">DELT∆ PREPARATÓRIO</div>

<div class="container">

<h1>Bem-vindo</h1>
<p class="price">Valor: 5.000 KZ</p>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button onclick="register()">Criar Conta</button>
<button onclick="login()">Entrar</button>

<p id="msg"></p>

</div>
<div class="card">
  <h3>💳 Pagamento</h3>
  <p>Valor: 5.000 KZ</p>
  <p><b>IBAN:</b></p>
  <p style="font-size:18px;">AO06 0040 0000 5071 2010 1017 8</p>
  <p>Envie comprovativo para validação</p>
</div>
</div>
</body>
</html>
