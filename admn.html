<body>

<div id="loginAdmin">
  <h2>Admin Login</h2>
  <input id="adminPass" type="password" placeholder="Senha do Admin">
  <button onclick="entrarAdmin()">Entrar</button>
  <p id="erro"></p>
</div>

<div id="painel" style="display:none;">
  <h2>Painel Admin</h2>

  <!-- AQUI FICA A LISTA DE ALUNOS -->
  <p>Admin logado com sucesso</p>
</div>

<script>
function entrarAdmin(){
  let senha = document.getElementById("adminPass").value;

  if(senha === "delta123"){
    document.getElementById("loginAdmin").style.display = "none";
    document.getElementById("painel").style.display = "block";
  } else {
    document.getElementById("erro").innerText = "Senha incorreta!";
  }
}
</script>

</body>
