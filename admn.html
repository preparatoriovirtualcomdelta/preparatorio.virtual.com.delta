<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin DELT∆</title>

<style>
body{
  font-family:Arial;
  text-align:center;
}

.card{
  border:1px solid #ccc;
  margin:15px;
  padding:15px;
  border-radius:10px;
}
</style>

</head>

<body>

<h1>👨‍💼 Painel Admin</h1>

<button onclick="logout()">Sair</button>

<div id="users"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
  storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
  messagingSenderId: "554101533814",
  appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// CARREGAR USERS
function load(){
 db.collection("users").get().then(s=>{
  let html="";

  s.forEach(d=>{
   let u=d.data();

   html+=`
   <div class="card">
    <p><b>Email:</b> ${u.email}</p>
    <p><b>Estado:</b> ${u.estado}</p>

    ${u.comprovativo 
      ? `<a href="${u.comprovativo}" target="_blank">📄 Ver comprovativo</a><br><br>`
      : `<p style="color:red;">Sem comprovativo</p>`}

    <button onclick="aprovar('${d.id}')">✔ Aprovar</button>
   </div>
   `;
  });

  document.getElementById("users").innerHTML=html;
 });
}

// APROVAR
function aprovar(id){
 db.collection("users").doc(id).update({
  estado:"aprovado"
 }).then(load);
}

// LOGOUT
function logout(){
  window.location.href = "index.html";
}

load();
</script>

</body>
</html>
