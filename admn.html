<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin DELT∆</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#f1f5f9;
}

h1{
  margin-top:20px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.card{
  background:white;
  margin:15px auto;
  padding:15px;
  width:80%;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.aprovar{
  background:#22c55e;
  color:white;
}

.aprovar:hover{
  background:#16a34a;
}

.filtro{
  background:#0f172a;
  color:white;
}

.filtro:hover{
  background:#1e293b;
}
</style>

</head>

<body>

<h1>👨‍💼 Painel Admin DELT∆</h1>

<!-- FILTROS -->
<button class="filtro" onclick="loadAll()">Todos</button>
<button class="filtro" onclick="loadPendentes()">Pendentes</button>
<button class="filtro" onclick="loadAprovados()">Aprovados</button>

<div id="users"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
  storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
  messagingSenderId: "554101533814",
  appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// MOSTRAR USUÁRIOS
function render(snapshot){
  let html = "";

  snapshot.forEach(doc=>{
    let u = doc.data();

    html += `
    <div class="card">
      <p><b>Email:</b> ${u.email}</p>
      <p><b>Estado:</b> ${u.estado}</p>

      ${u.comprovativo 
        ? `<a href="${u.comprovativo}" target="_blank">📄 Ver comprovativo</a><br><br>`
        : `<p style="color:red;">Sem comprovativo</p>`}

      <button class="aprovar" onclick="aprovar('${doc.id}')">✔ Aprovar</button>
    </div>
    `;
  });

  document.getElementById("users").innerHTML = html;
}

// TODOS
function loadAll(){
  db.collection("users").get().then(render);
}

// PENDENTES
function loadPendentes(){
  db.collection("users").where("estado","==","pendente").get().then(render);
}

// APROVADOS
function loadAprovados(){
  db.collection("users").where("estado","==","aprovado").get().then(render);
}

// APROVAR
function aprovar(id){
  db.collection("users").doc(id).update({
    estado:"aprovado"
  }).then(()=>{
    loadAll();
  });
}

// INICIAL
loadAll();
</script>

</body>
</html>
