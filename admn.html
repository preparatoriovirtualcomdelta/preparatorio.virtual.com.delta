<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - DELT∆</title>
</head>

<body style="font-family: Arial; text-align:center;">

  <h1>👨‍💼 Painel Admin DELT∆</h1>

  <button onclick="logout()">🚪 Sair</button>

  <hr>

  <div id="users"></div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    // 🔒 BLOQUEIO TOTAL DE ACESSO
    if(localStorage.getItem("admin") !== "true"){
      alert("❌ Acesso negado");
      window.location.href = "admin-login.html";
    }

    const firebaseConfig = {
      apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
      authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
      projectId: "preparatoriovirtualcomdelta",
      storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
      messagingSenderId: "554101533814",
      appId: "1:554101533814:web:ed46583d92f4e14679c357"
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();

    // 📥 CARREGAR UTILIZADORES
    function loadUsers(){

      db.collection("users").get().then(snapshot => {

        let html = "";

        snapshot.forEach(doc => {

          let u = doc.data();

          html += `
            <div style="border:1px solid #ccc; margin:10px; padding:10px;">
              <p><b>Email:</b> ${u.email}</p>
              <p><b>Estado:</b> ${u.estado}</p>

              <button onclick="aprovar('${doc.id}')">
                ✔ Aprovar
              </button>
            </div>
          `;
        });

        document.getElementById("users").innerHTML = html;

      });

    }

    // ✔ APROVAR UTILIZADOR
    function aprovar(id){

      db.collection("users").doc(id).update({
        estado: "aprovado"
      }).then(() => {
        loadUsers();
      });

    }

    // 🚪 LOGOUT
    function logout(){
      localStorage.removeItem("admin");
      window.location.href = "admin-login.html";
    }

    loadUsers();

  </script>

</body>
</html>
