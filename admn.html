<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>ADMIN - DELT∆</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h1>Painel Admin - Aprovar Alunos</h1>

<p id="msg"></p>

<hr>

<div id="users"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  // 🔥 MESMO FIREBASE DO TEU SITE
  const firebaseConfig = {
    apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
    authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
    projectId: "preparatoriovirtualcomdelta",
    storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
    messagingSenderId: "554101533814",
    appId: "1:554101533814:web:ed46583d92f4e14679c357"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();

  function loadUsers() {
    db.collection("users").get().then(snapshot => {
      let html = "";

      snapshot.forEach(doc => {
        let user = doc.data();

        html += `
          <div style="border:1px solid #ccc; margin:10px; padding:10px;">
            <p><b>Email:</b> ${user.email}</p>
            <p><b>Estado:</b> ${user.estado}</p>

            <button onclick="aprovar('${doc.id}')">
              Aprovar
            </button>
          </div>
        `;
      });

      document.getElementById("users").innerHTML = html;
    });
  }

  function aprovar(id) {
    db.collection("users").doc(id).update({
      estado: "aprovado"
    }).then(() => {
      alert("Aluno aprovado ✔");
      loadUsers();
    });
  }

  loadUsers();

</script>

</body>
</html>
