<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body>

<h2>Painel Admin</h2>

<div id="users"></div>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const div = document.getElementById("users");

async function load(){
  const snap = await getDocs(collection(db,"users"));

  snap.forEach(u=>{
    const d = u.data();

    div.innerHTML += `
      <p>
        ${d.email} | ${d.status || "pendente"}
        <button onclick="aprovar('${u.id}')">Aprovar</button>
      </p>
    `;
  });
}

window.aprovar = async function(id){
  await updateDoc(doc(db,"users",id),{
    status:"aprovado"
  });

  alert("Aprovado");
  location.reload();
}

load();
</script>

</body>
</html>
