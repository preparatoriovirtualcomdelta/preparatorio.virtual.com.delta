<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Área do Aluno - DELTA</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#f4f4f4;
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:auto;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

input{
  padding:10px;
  width:90%;
  margin:5px;
}

button{
  padding:10px;
  width:95%;
  margin:5px;
  border:none;
  background:#0f172a;
  color:white;
  cursor:pointer;
}

#status{
  margin-top:10px;
  font-weight:bold;
}
</style>

</head>

<body>

<h1>PREPARATÓRIO VIRTUAL COM DELTA</h1>

<div class="box">

<p><b>Área escolhida:</b></p>
<p id="area"></p>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Senha"><br>

<input type="file" id="file"><br><br>

<button onclick="register()">Criar Conta</button>
<button onclick="login()">Entrar</button>

<p id="status"></p>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
  storageBucket: "preparatoriovirtualcomdelta.appspot.com",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// MOSTRAR ÁREA ESCOLHIDA
document.getElementById("area").innerText = localStorage.getItem("area");

// REGISTAR
function register(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let file = document.getElementById("file").files[0];

  auth.createUserWithEmailAndPassword(email, password)
  .then(user => {

    let uid = user.user.uid;

    let ref = storage.ref("comprovativos/" + uid);

    ref.put(file).then(()=>{

      ref.getDownloadURL().then(async url => {

        await db.collection("users").doc(uid).set({
          email: email,
          area: localStorage.getItem("area"),
          estado: "pendente",
          comprovativo: url
        });

        document.getElementById("status").innerText = "Conta criada! Aguarde aprovação.";

      });

    });

  })
  .catch(err => {
    document.getElementById("status").innerText = err.message;
  });

}

// LOGIN
function login(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(async user => {

    let uid = user.user.uid;

    let doc = await db.collection("users").doc(uid).get();

    if(!doc.exists){
      document.getElementById("status").innerText = "Conta não encontrada";
      return;
    }

    let data = doc.data();

    if(data.estado === "aprovado"){
      document.getElementById("status").innerText = "Acesso permitido ✔";
      window.location.href = "aulas.html";
    } else {
      document.getElementById("status").innerText = "Ainda não aprovado ⏳";
    }

  })
  .catch(err => {
    document.getElementById("status").innerText = err.message;
  });

}

</script>

</body>
</html>
