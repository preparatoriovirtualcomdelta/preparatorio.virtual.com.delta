<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Área do Aluno - DELTA</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#f4f4f4;
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:auto;
}

input{
  padding:10px;
  width:90%;
  margin:5px;
}

button{
  padding:10px;
  width:95%;
  margin:5px;
  border:none;
  background:#0f172a;
  color:white;
}

#status{
  margin-top:10px;
}
</style>

</head>

<body>

<h1>PREPARATÓRIO VIRTUAL COM DELTA</h1>
<h3>Medicina e Ciências da Saúde</h3>

<div class="box">

<p><b>Área:</b></p>
<p id="area"></p>

<p><b>Pagamento:</b></p>
<p>IBAN: AO06 0040 0000 5071 2010 1017 8</p>
<p>PROPRIETÁRIO: MPEKO CRUZ</p>

<hr>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Senha"><br>

<button onclick="register()">Criar Conta</button>
<button onclick="login()">Entrar</button>

<p id="status"></p>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// mostrar área
document.getElementById("area").innerText = localStorage.getItem("area");

// REGISTAR
function register(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .then(async user => {

    let uid = user.user.uid;

    await db.collection("users").doc(uid).set({
      email: email,
      area: localStorage.getItem("area"),
      estado: "pendente"
    });

    document.getElementById("status").innerText = "Conta criada! Aguarde aprovação.";

  })
  .catch(err => {
    document.getElementById("status").innerText = err.message;
  });

}

// LOGIN
function login(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(async user => {

    let uid = user.user.uid;

    let doc = await db.collection("users").doc(uid).get();

    if(!doc.exists){
      document.getElementById("status").innerText = "Conta não encontrada";
      return;
    }

    if(doc.data().estado === "aprovado"){
      document.getElementById("status").innerText = "Acesso permitido ✔";
      window.location.href = "aulas.html";
    } else {
      document.getElementById("status").innerText = "Ainda não aprovado ⏳";
    }

  })
  .catch(err => {
    document.getElementById("status").innerText = err.message;
  });

}
</script>

</body>
</html>
