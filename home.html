<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Login DELTA</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h1>PREPARATÓRIO VIRTUAL COM DELTA</h1>
<h3>Medicina e Ciências da Saúde</h3>

<hr>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Senha"><br><br>

<input type="file" id="comprovativo"><br><br>

<button onclick="register()">Criar Conta</button>
<button onclick="login()">Entrar</button>

<p id="msg"></p>

<script type="module">

import { auth, db, storage } from "./firebase.js";

import {
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "firebase/auth";

import {
  doc,
  setDoc,
  getDoc
} from "firebase/firestore";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "firebase/storage";

function msg(t){
  document.getElementById("msg").innerText = t;
}

window.register = async function(){

  let email = email.value;
  let password = password.value;
  let file = document.getElementById("comprovativo").files[0];

  const userCred = await createUserWithEmailAndPassword(auth, email, password);

  let uid = userCred.user.uid;

  let fileRef = ref(storage, "comprovativos/" + uid);

  await uploadBytes(fileRef, file);

  let url = await getDownloadURL(fileRef);

  await setDoc(doc(db, "users", uid), {
    email: email,
    estado: "pendente",
    comprovativo: url
  });

  msg("Conta criada! Aguarde aprovação.");

}

window.login = async function(){

  let email = email.value;
  let password = password.value;

  const userCred = await signInWithEmailAndPassword(auth, email, password);

  let uid = userCred.user.uid;

  let snap = await getDoc(doc(db, "users", uid));

  if(snap.data().estado === "aprovado"){
    msg("Acesso permitido ✔");
    window.location.href = "aulas.html";
  } else {
    msg("Ainda não aprovado ⏳");
  }

}

</script>

</body>
</html>
