<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN COMPLETO</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.box{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.aprovar{background:green;color:white;}
.upload{background:#3b82f6;color:white;}
.card{background:#111827;padding:10px;margin:10px 0;border-radius:10px;}
</style>
</head>

<body>

<h2>ADMIN DELT∆</h2>

<!-- SENHA ADMIN -->
<div class="box">
<h3>Senha do Admin</h3>
<input type="password" id="adminSenha" placeholder="Coloque a senha do admin">
<button onclick="verificarSenha()">Entrar</button>
<div id="senhaErro" style="color:red;margin-top:10px;"></div>
</div>

<div id="adminPainel" style="display:none;">

<!-- UPLOAD AULAS -->
<div class="box">
<h3>Upload de Aulas</h3>

<input id="titulo" placeholder="Título">

<select id="tipo">
<option value="video">Vídeo</option>
<option value="pdf">PDF</option>
<option value="imagem">Imagem</option>
</select>

<input type="file" id="file">

<select id="area">
<option value="medicina geral">Medicina Geral</option>
<option value="enfermagem">Enfermagem</option>
<option value="farmacia">Farmácia</option>
</select>

<button class="upload" onclick="upload()">Enviar Aula</button>
</div>

<!-- USERS -->
<div class="box">
<h3>Usuários</h3>
<div id="users"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// MESMO PROJETO DO LOGIN
const firebaseConfig = {
apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
projectId: "preparatoriovirtualcomdelta",
storageBucket: "preparatoriovirtualcomdelta.appspot.com",
messagingSenderId: "554101533814",
appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const ADMIN_PASSWORD = "12345678910xxxDelt∆xxxLoginwwwPermissãoFormulas17$";

// ===== SENHA ADMIN =====
function verificarSenha(){
const senha = document.getElementById("adminSenha").value;
const erro = document.getElementById("senhaErro");

if(senha !== ADMIN_PASSWORD){
erro.innerText = "Senha incorreta!";
return;
}

document.getElementById("adminPainel").style.display = "block";
document.querySelector(".box").style.display = "none"; // esconder input senha
carregarUsers();
}

// ===== USERS =====
async function carregarUsers(){
const snap = await getDocs(collection(db,"users"));
const div = document.getElementById("users");
div.innerHTML = "";

snap.forEach(u=>{
const d = u.data();

div.innerHTML += `
<div class="card">
<p>Email: ${d.email}</p>
<p>Área: ${d.area}</p>
<p>Status: ${d.approved ? "APROVADO" : "PENDENTE"}</p>
${!d.approved ? `<button class="aprovar" onclick="aprovar('${u.id}')">Aprovar</button>` : ""}
</div>
`;
});
}

window.aprovar = async function(id){
await updateDoc(doc(db,"users",id),{approved:true});
alert("Usuário aprovado!");
carregarUsers();
}

// ===== UPLOAD =====
window.upload = async function(){

const titulo = document.getElementById("titulo").value;
const tipo = document.getElementById("tipo").value;
const file = document.getElementById("file").files[0];
const area = document.getElementById("area").value;

if(!titulo || !file || !area){
alert("Preencha todos os campos");
return;
}

const fileRef = ref(storage, tipo + "/" + Date.now() + "_" + file.name);
await uploadBytes(fileRef, file);
const url = await getDownloadURL(fileRef);

await addDoc(collection(db,"aulas"),{
titulo,
tipo,
url,
area
});

alert("Aula enviada!");
}

</script>

</body>
</html>
