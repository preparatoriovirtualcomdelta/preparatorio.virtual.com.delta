<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN DELT∆</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
width:400px;
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.loginBtn{background:#3b82f6;color:white;}
.uploadBtn{background:#22c55e;color:white;}
.aprovar{background:green;color:white;margin-top:5px;}

.hidden{display:none;}

.card{
background:#111827;
padding:10px;
margin:10px 0;
border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN ADMIN -->
<div class="box" id="loginBox">

<h2>Admin Login</h2>

<input type="password" id="senha" placeholder="Senha admin">
<button class="loginBtn" onclick="entrar()">Entrar</button>

<p id="erro" style="color:red"></p>

</div>

<!-- PAINEL -->
<div id="painel" class="hidden" style="width:80%;">

<h2>PAINEL ADMIN</h2>

<!-- UPLOAD -->
<div class="box">
<h3>Upload Aulas</h3>

<input id="titulo" placeholder="Título">

<select id="tipo">
<option value="video">Vídeo</option>
<option value="pdf">PDF</option>
<option value="imagem">Imagem</option>
</select>

<input type="file" id="file">

<select id="area">
<option value="medicina geral">Medicina Geral</option>
<option value="enfermagem">Enfermagem</option>
<option value="farmacia">Farmácia</option>
</select>

<button class="uploadBtn" onclick="upload()">Enviar Aula</button>
</div>

<!-- USERS -->
<div class="box">
<h3>Usuários</h3>
<div id="users"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
projectId: "preparatoriovirtualcomdelta",
storageBucket: "preparatoriovirtualcomdelta.appspot.com",
messagingSenderId: "554101533814",
appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// 🔐 SENHA ORIGINAL
const senhaAdmin = "12345678910xxxDelt∆xxxLoginwwwPermissãoFormulas17$";

// LOGIN ADMIN
window.entrar = function(){

const s = document.getElementById("senha").value;

if(s !== senhaAdmin){
document.getElementById("erro").innerText = "Senha incorreta!";
return;
}

document.getElementById("loginBox").style.display = "none";
document.getElementById("painel").classList.remove("hidden");

carregarUsers();
}

// USERS
async function carregarUsers(){

const snap = await getDocs(collection(db,"users"));

const div = document.getElementById("users");
div.innerHTML = "";

snap.forEach(u=>{

const d = u.data();

div.innerHTML += `
<div class="card">
<p>${d.email}</p>
<p>${d.area}</p>
<p>${d.approved ? "APROVADO" : "PENDENTE"}</p>

${!d.approved ? `<button class="aprovar" onclick="aprovar('${u.id}')">Aprovar</button>` : ""}
</div>
`;
});

}

window.aprovar = async function(id){
await updateDoc(doc(db,"users",id),{approved:true});
alert("Usuário aprovado!");
carregarUsers();
}

// UPLOAD
window.upload = async function(){

const titulo = document.getElementById("titulo").value;
const tipo = document.getElementById("tipo").value;
const file = document.getElementById("file").files[0];
const area = document.getElementById("area").value;

if(!titulo || !file){
alert("Preenche tudo");
return;
}

const fileRef = ref(storage, tipo + "/" + Date.now() + "_" + file.name);

await uploadBytes(fileRef, file);

const url = await getDownloadURL(fileRef);

await addDoc(collection(db,"aulas"),{
titulo,
tipo,
url,
area
});

alert("Aula enviada!");
}

</script>

</body>
</html>
