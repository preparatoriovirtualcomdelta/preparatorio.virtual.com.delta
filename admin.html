<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN - DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.email{
font-weight:bold;
}

.status{
padding:5px 10px;
border-radius:6px;
font-size:13px;
}

.ok{background:green;}
.no{background:red;}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.approve{
background:#22c55e;
color:white;
}

.remove{
background:#ef4444;
color:white;
}
</style>
</head>

<body>

<h1>Painel Admin DELT∆</h1>

<div class="container" id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuZ2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
  storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
  messagingSenderId: "554101533814",
  appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");

async function loadUsers(){

lista.innerHTML = "";

const snap = await getDocs(collection(db, "users"));

snap.forEach(docu => {

const data = docu.data();

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<div>
<div class="email">${data.email || "Sem email"}</div>
<div class="status ${data.approved ? "ok" : "no"}">
${data.approved ? "APROVADO" : "PENDENTE"}
</div>
</div>

<div>
<button class="approve">Aprovar</button>
</div>
`;

div.querySelector(".approve").onclick = async () => {

await updateDoc(doc(db, "users", docu.id), {
approved: !data.approved
});

loadUsers();
};

lista.appendChild(div);

});

}

loadUsers();

</script>

</body>
</html>
