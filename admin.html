<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN - DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
}
</style>
</head>

<body>

<h2>ADMIN</h2>

<div class="container">

<h3>Usuários</h3>
<div id="lista"></div>

<hr>

<h3>Adicionar Aula</h3>

<input id="titulo" placeholder="Título"><br><br>

<select id="tipo">
<option value="video">Vídeo</option>
<option value="pdf">PDF</option>
<option value="imagem">Imagem</option>
</select><br><br>

<input id="url" placeholder="Link do conteúdo"><br><br>

<select id="area">
<option value="medicina geral">Medicina Geral</option>
<option value="enfermagem">Enfermagem</option>
<option value="farmacia">Farmácia</option>
<option value="analises clinicas">Análises Clínicas</option>
<option value="fisioterapia">Fisioterapia</option>
<option value="nutrição e dietética">Nutrição e Dietética</option>
<option value="cardiopneumologia">Cardiopneumologia</option>
<option value="medicina dentária">Medicina Dentária</option>
</select><br><br>

<button onclick="enviar()">Enviar Aula</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDoF_h5rVPvVFsHJNcXdWO1gkzwdm65pZQ",
  authDomain: "preparatoriovirtualcomde-71e23.firebaseapp.com",
  projectId: "preparatoriovirtualcomde-71e23",
  storageBucket: "preparatoriovirtualcomde-71e23.firebasestorage.app",
  messagingSenderId: "738659946479",
  appId: "1:738659946479:web:882735f1e23b5d0764b01a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SENHA = "123456";

const pass = prompt("Senha admin:");
if(pass !== SENHA){
alert("Acesso negado");
document.body.innerHTML="";
}

// 🔥 LISTAR USUÁRIOS
async function loadUsers(){

const lista = document.getElementById("lista");
lista.innerHTML = "";

const snap = await getDocs(collection(db,"users"));

snap.forEach(docu=>{
const data = docu.data();

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<div>
${data.email}<br>
${data.approved ? "APROVADO" : "PENDENTE"}
</div>
<button>Aprovar</button>
`;

div.querySelector("button").onclick = async ()=>{
await updateDoc(doc(db,"users",docu.id),{
approved: true
});
loadUsers();
};

lista.appendChild(div);
});

}

loadUsers();

// 🚀 ENVIAR AULA
window.enviar = async function(){

const titulo = document.getElementById("titulo").value;
const tipo = document.getElementById("tipo").value;
const url = document.getElementById("url").value;
const area = document.getElementById("area").value;

if(!titulo || !url){
alert("Preencha tudo");
return;
}

// 🔥 corrigir link de vídeo drive
let finalURL = url;

if(tipo === "video" && url.includes("drive.google.com")){
finalURL = url.replace("/view","/preview");
}

await addDoc(collection(db,"aulas"),{
titulo,
tipo,
url: finalURL,
area
});

alert("Aula enviada!");
}

</script>

</body>
</html>
