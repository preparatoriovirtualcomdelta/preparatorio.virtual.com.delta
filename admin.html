<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN - DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* LOGIN */
.login{
text-align:center;
transform:scale(1.1);
}

input{
padding:16px;
width:350px;
border-radius:10px;
border:none;
font-size:16px;
margin-top:10px;
}

/* BOTÃO */
button{
padding:14px 24px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* PAINEL */
.container{
max-width:1100px;
width:90%;
margin:auto;
display:none;
transform:scale(1.1);
text-align:center;
}

h1{
font-size:38px;
margin-bottom:30px;
}

/* CARDS */
.card{
background:#1e293b;
padding:25px;
margin:15px 0;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
font-size:18px;
}

/* STATUS */
.status{
padding:6px 12px;
border-radius:8px;
font-size:14px;
}

.ok{background:#16a34a;}
.no{background:#dc2626;}

/* BOTÃO APROVAR */
.approve{
background:#22c55e;
color:white;
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

/* RESPONSIVO */
@media(max-width:600px){
.login, .container{
transform:scale(1);
}

input{
width:90%;
}

.card{
flex-direction:column;
gap:10px;
}
}
</style>
</head>

<body>

<!-- LOGIN ADMIN -->
<div class="login" id="loginBox">

<h2>Acesso Admin</h2>

<input type="password" id="senhaAdmin" placeholder="Digite a senha"><br>

<button onclick="entrar()">Entrar</button>

<p id="erro" style="color:red;"></p>

</div>

<!-- PAINEL -->
<div class="container" id="painel">

<h1>Painel Admin DELT∆</h1>

<div id="lista"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuZ2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
  storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
  messagingSenderId: "554101533814",
  appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");

// 🔐 SENHA ADMIN
const SENHA = "12345678910xxxDelt∆xxxLoginwwwPermissãoFormulas17$";

// LOGIN
window.entrar = function(){

const senha = document.getElementById("senhaAdmin").value;

if(senha === SENHA){

document.getElementById("loginBox").style.display = "none";
document.getElementById("painel").style.display = "block";

loadUsers();

}else{
document.getElementById("erro").innerText = "Senha incorreta";
}

}

// CARREGAR USUÁRIOS
async function loadUsers(){

lista.innerHTML = "";

const snap = await getDocs(collection(db, "users"));

snap.forEach(docu => {

const data = docu.data();

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<div>
<b>${data.email || "Sem email"}</b><br>
<span class="status ${data.approved ? "ok" : "no"}">
${data.approved ? "APROVADO" : "PENDENTE"}
</span>
</div>

<button class="approve">Aprovar</button>
`;

div.querySelector(".approve").onclick = async () => {

await updateDoc(doc(db, "users", docu.id), {
approved: !data.approved
});

loadUsers();
};

lista.appendChild(div);

});

}

</script>

</body>
</html>
