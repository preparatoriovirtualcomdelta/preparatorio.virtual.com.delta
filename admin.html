<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN - DELT∆</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h2{
text-align:center;
}

.card{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:12px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.aprovar{
background:green;
color:white;
}

.reload{
background:#3b82f6;
color:white;
display:block;
margin:20px auto;
}
</style>
</head>

<body>

<h2>Painel Admin - Aprovação de Usuários</h2>

<button class="reload" onclick="carregar()">Recarregar lista</button>

<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
projectId: "preparatoriovirtualcomdelta",
storageBucket: "preparatoriovirtualcomdelta.appspot.com",
messagingSenderId: "554101533814",
appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");

async function carregar(){

lista.innerHTML = "A carregar...";

const snap = await getDocs(collection(db,"users"));

lista.innerHTML = "";

snap.forEach((userDoc)=>{

const data = userDoc.data();

lista.innerHTML += `
<div class="card">
<p><b>Email:</b> ${data.email}</p>
<p><b>Área:</b> ${data.area}</p>
<p><b>Status:</b> ${data.approved ? "✔ APROVADO" : "⏳ PENDENTE"}</p>

${!data.approved ? `
<button class="aprovar" onclick="aprovar('${userDoc.id}')">
Aprovar
</button>
` : ""}
</div>
`;
});

}

window.aprovar = async function(id){

await updateDoc(doc(db,"users",id),{
approved: true
});

alert("Usuário aprovado com sucesso!");
carregar();
}

carregar();

</script>

</body>
</html>
