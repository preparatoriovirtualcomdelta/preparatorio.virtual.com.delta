<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN - DELT∆</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

#error{
color:red;
margin-top:10px;
}

.hidden{
display:none;
}

.card{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:12px;
}

.aprovar{
background:green;
color:white;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN ADMIN -->
<div class="box" id="loginBox">

<h2>Admin Login</h2>

<input type="password" id="senha" placeholder="Senha admin">

<button onclick="entrar()">Entrar</button>

<div id="error"></div>

</div>

<!-- PAINEL -->
<div id="painel" class="hidden" style="width:80%;">

<h2>Painel Admin</h2>

<div id="lista"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
projectId: "preparatoriovirtualcomdelta",
storageBucket: "preparatoriovirtualcomdelta.appspot.com",
messagingSenderId: "554101533814",
appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const senhaCorreta = "12345678910xxxDelt∆xxxLoginwwwPermissãoFormulas17$";

window.entrar = function(){

const senha = document.getElementById("senha").value;

if(senha !== senhaCorreta){
document.getElementById("error").innerText = "Senha incorreta!";
return;
}

document.getElementById("loginBox").style.display = "none";
document.getElementById("painel").classList.remove("hidden");

carregar();
}

const lista = document.getElementById("lista");

async function carregar(){

lista.innerHTML = "A carregar...";

const snap = await getDocs(collection(db,"users"));

lista.innerHTML = "";

snap.forEach((userDoc)=>{

const data = userDoc.data();

lista.innerHTML += `
<div class="card">
<p><b>Email:</b> ${data.email}</p>
<p><b>Área:</b> ${data.area}</p>
<p><b>Status:</b> ${data.approved ? "✔ APROVADO" : "⏳ PENDENTE"}</p>

${!data.approved ? `
<button class="aprovar" onclick="aprovar('${userDoc.id}')">
Aprovar
</button>
` : ""}
</div>
`;
});

}

window.aprovar = async function(id){

await updateDoc(doc(db,"users",id),{
approved: true
});

alert("Usuário aprovado!");
carregar();
}

</script>

</body>
</html>
