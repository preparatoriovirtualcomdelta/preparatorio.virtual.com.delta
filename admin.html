<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN - DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* LOGIN */
.login{
text-align:center;
transform:scale(1.2);
}

input{
padding:16px;
margin:6px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* PAINEL */
.container{
display:none;
width:95%;
max-width:1300px;
transform:scale(1.05);
}

/* CARDS */
.card{
background:#1e293b;
padding:20px;
margin:12px 0;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:17px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* STATUS */
.ok{background:#16a34a;padding:6px;border-radius:6px;}
.no{background:#dc2626;padding:6px;border-radius:6px;}

hr{
margin:30px 0;
border:1px solid #334155;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h2>Admin DELT∆</h2>
<input type="password" id="senhaAdmin" placeholder="Senha"><br>
<button onclick="entrar()">Entrar</button>
<p id="erro" style="color:red;"></p>
</div>

<!-- PAINEL -->
<div class="container" id="painel">

<h2>Alunos</h2>
<div id="lista"></div>

<hr>

<h2>Upload de Aula</h2>

<input type="text" id="titulo" placeholder="Título da aula"><br>
<input type="file" id="ficheiro"><br>

<button onclick="upload()">Enviar Aula</button>

<hr>

<h2>Comprovativos</h2>
<div id="comprovativos"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuZ2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
  storageBucket: "preparatoriovirtualcomdelta.firebasestorage.app",
  messagingSenderId: "554101533814",
  appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const SENHA = "12345678910xxxDelt∆xxxLoginwwwPermissãoFormulas17$";

// LOGIN
window.entrar = function(){
const senha = document.getElementById("senhaAdmin").value;

if(senha === SENHA){
document.getElementById("loginBox").style.display="none";
document.getElementById("painel").style.display="block";
loadUsers();
loadComprovativos();
}else{
document.getElementById("erro").innerText="Senha incorreta";
}
}

// USUÁRIOS
async function loadUsers(){
const lista = document.getElementById("lista");
lista.innerHTML="";

const snap = await getDocs(collection(db,"users"));

snap.forEach(docu=>{
const data = docu.data();

const div = document.createElement("div");
div.className="card";

div.innerHTML=`
<div>
<b>${data.email || "Sem email"}</b><br>
<span class="${data.approved?'ok':'no'}">
${data.approved?'APROVADO':'PENDENTE'}
</span>
</div>
<button>Aprovar</button>
`;

div.querySelector("button").onclick=async()=>{
await updateDoc(doc(db,"users",docu.id),{
approved:!data.approved
});
loadUsers();
};

lista.appendChild(div);
});
}

// 🚀 UPLOAD COMPLETO (VIDEO + PDF + IMAGEM + ÁREA)
window.upload = async function(){

const file = document.getElementById("ficheiro").files[0];
const titulo = document.getElementById("titulo").value;

if(!file || !titulo) return alert("Preencha tudo");

// detectar tipo
let tipo = "outro";
if(file.type.includes("video")) tipo = "video";
else if(file.type.includes("pdf")) tipo = "pdf";
else if(file.type.includes("image")) tipo = "imagem";

// escolher área
const area = prompt("Área da aula (medicina, enfermagem, farmacia...)");

if(!area) return alert("Área obrigatória");

const storageRef = ref(storage, "aulas/" + Date.now() + "_" + file.name);

await uploadBytes(storageRef, file);

const url = await getDownloadURL(storageRef);

// guardar no banco
await addDoc(collection(db,"aulas"),{
titulo: titulo,
url: url,
tipo: tipo,
area: area.toLowerCase()
});

alert("Aula enviada com sucesso!");
}

// COMPROVATIVOS
async function loadComprovativos(){

const div = document.getElementById("comprovativos");
div.innerHTML="";

const snap = await getDocs(collection(db,"comprovativos"));

snap.forEach(docu=>{
const data = docu.data();

const el = document.createElement("div");
el.innerHTML = `<a href="${data.url}" target="_blank">Ver comprovativo</a><hr>`;

div.appendChild(el);
});
}

</script>

</body>
</html>
