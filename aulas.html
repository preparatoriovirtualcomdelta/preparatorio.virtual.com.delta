<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Aulas - DELTA</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  text-align:center;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  margin:20px auto;
  border-radius:10px;
  max-width:600px;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

video{
  width:100%;
  margin-top:10px;
}

img{
  width:100%;
  margin-top:10px;
}
</style>

</head>

<body>

<h1>📚 AULAS - PREPARATÓRIO VIRTUAL COM DELTA</h1>

<p id="msg">Verificando acesso...</p>

<div id="conteudo" style="display:none;">

  <!-- VÍDEOS -->
  <div class="card">
    <h3>🎥 Aula 1</h3>
    <video controls>
      <source src="video1.mp4" type="video/mp4">
    </video>
  </div>

  <div class="card">
    <h3>🎥 Aula 2</h3>
    <video controls>
      <source src="video2.mp4" type="video/mp4">
    </video>
  </div>

  <!-- PDFs -->
  <div class="card">
    <h3>📄 Material PDF</h3>
    <a href="aula1.pdf" target="_blank">Abrir PDF 1</a><br><br>
    <a href="aula2.pdf" target="_blank">Abrir PDF 2</a>
  </div>

  <!-- IMAGENS -->
  <div class="card">
    <h3>🖼 Resumos</h3>
    <img src="resumo1.jpg">
    <img src="resumo2.jpg">
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// PROTEÇÃO
auth.onAuthStateChanged(async user => {

  if(!user){
    window.location.href = "home.html";
    return;
  }

  let doc = await db.collection("users").doc(user.uid).get();

  if(!doc.exists){
    window.location.href = "home.html";
    return;
  }

  let data = doc.data();

  if(data.estado === "aprovado"){
    document.getElementById("msg").innerText = "Acesso liberado ✔";
    document.getElementById("conteudo").style.display = "block";
  } else {
    document.getElementById("msg").innerText = "Acesso bloqueado ⏳";
  }

});
</script>

</body>
</html>
