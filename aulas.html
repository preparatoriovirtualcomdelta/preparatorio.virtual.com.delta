<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aulas - Delta</title>

<style>
body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

h1{
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
margin:15px;
border-radius:10px;
text-align:left;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

a{
display:inline-block;
margin-top:10px;
color:blue;
}
</style>
</head>

<body>

<h1>AULAS</h1>

<div class="container" id="content">
Carregando...
</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const content = document.getElementById("content");

auth.onAuthStateChanged(async (user)=>{

if(!user){
  window.location.href = "login.html";
  return;
}

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
  content.innerHTML = "Sem dados de utilizador";
  return;
}

const data = snap.data();

if(data.status !== "aprovado"){
  content.innerHTML = "<h2>Acesso bloqueado</h2><p>Aguardando aprovação do admin</p>";
  return;
}

// SE APROVADO MOSTRA AULAS
content.innerHTML = `

<div class="card">
<h2>Vídeo Aula 1 (Curto)</h2>
<video controls>
<source src="LINK_VIDEO_CURTO.mp4" type="video/mp4">
</video>
</div>

<div class="card">
<h2>Vídeo Aula 2 (Longo)</h2>
<video controls>
<source src="LINK_VIDEO_LONGO.mp4" type="video/mp4">
</video>
</div>

<div class="card">
<h2>Apostila PDF</h2>
<a href="LINK_PDF.pdf" target="_blank">Abrir PDF</a>
</div>

<div class="card">
<h2>Imagem de Apoio</h2>
<img src="LINK_IMAGEM.jpg">
</div>

`;

});

</script>

</body>
  </html>
