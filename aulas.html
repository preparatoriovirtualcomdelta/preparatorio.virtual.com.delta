<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AULAS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin:15px 0;
border-radius:10px;
}

a{
color:#22c55e;
}
</style>
</head>

<body oncontextmenu="return false;">

<div class="container">
<h2 id="area"></h2>
<div id="lista"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDoF_h5rVPvVFsHJNcXdWO1gkzwdm65pZQ",
  authDomain: "preparatoriovirtualcomde-71e23.firebaseapp.com",
  projectId: "preparatoriovirtualcomde-71e23",
  storageBucket: "preparatoriovirtualcomde-71e23.firebasestorage.app",
  messagingSenderId: "738659946479",
  appId: "1:738659946479:web:882735f1e23b5d0764b01a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const areaUser = localStorage.getItem("area");

document.getElementById("area").innerText = "Área: " + areaUser;

// 🔐 PROTEÇÃO
onAuthStateChanged(auth, (user)=>{
if(!user){
window.location.href = "login.html";
return;
}
carregar();
});

// 🚀 CARREGAR AULAS
async function carregar(){

const snap = await getDocs(collection(db,"aulas"));

snap.forEach(docu=>{
const data = docu.data();

if(data.area !== areaUser) return;

const div = document.createElement("div");
div.className = "card";

let html = `<h3>${data.titulo}</h3>`;

// 🎥 VIDEO (SEM DOWNLOAD)
if(data.tipo === "video"){
html += `
<iframe 
src="${data.url}" 
width="100%" 
height="250"
allow="autoplay"
oncontextmenu="return false;">
</iframe>
`;
}

// 📄 PDF
if(data.tipo === "pdf"){
html += `<a href="${data.url}" target="_blank">📄 Baixar PDF</a>`;
}

// 🖼 IMAGEM
if(data.tipo === "imagem"){
html += `
<img src="${data.url}" width="100%">
<br>
<a href="${data.url}" download>📥 Baixar imagem</a>
`;
}

div.innerHTML = html;
lista.appendChild(div);

});

}

</script>

</body>
</html>
