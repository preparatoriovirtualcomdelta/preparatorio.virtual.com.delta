<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AULAS - DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
color:white;
text-align:center;
padding:20px;
}

h1{
font-size:38px;
margin-bottom:30px;
}

/* CARD */
.card{
background:#1e293b;
margin:20px auto;
padding:20px;
border-radius:15px;
max-width:700px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* TITULO */
.card h3{
margin-bottom:15px;
}

/* MEDIA */
video{
width:100%;
border-radius:10px;
}

iframe{
width:100%;
height:500px;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
}

/* RESPONSIVO */
@media(max-width:600px){
h1{
font-size:28px;
}
}
</style>
</head>

<body>

<h1>Minhas Aulas</h1>

<div id="aulas"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuZ2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔒 VERIFICA LOGIN
const user = localStorage.getItem("user");
const area = localStorage.getItem("area");

if(!user || !area){
alert("Faça login primeiro");
window.location.href="index.html";
}

// 🚀 CARREGAR AULAS
async function load(){

const container = document.getElementById("aulas");
container.innerHTML = "";

const snap = await getDocs(collection(db,"aulas"));

snap.forEach(doc => {

const data = doc.data();

// FILTRO POR ÁREA
if(data.area === area){

let conteudo = "";

// 🎥 VIDEO
if(data.tipo === "video"){
conteudo = `<video controls src="${data.url}"></video>`;
}

// 📄 PDF
else if(data.tipo === "pdf"){
conteudo = `<iframe src="${data.url}"></iframe>`;
}

// 🖼️ IMAGEM
else if(data.tipo === "imagem"){
conteudo = `<img src="${data.url}">`;
}

// OUTROS
else{
conteudo = `<a href="${data.url}" target="_blank">Abrir ficheiro</a>`;
}

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h3>${data.titulo}</h3>
${conteudo}
`;

container.appendChild(card);

}

});

}

load();

</script>

</body>
</html>
