<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AULAS - DELT∆</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
padding:20px;
background:#020617;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin:15px 0;
border-radius:15px;
}

video{
width:100%;
border-radius:10px;
margin-top:10px;
}

a.download{
display:inline-block;
margin-top:10px;
padding:10px;
background:#22c55e;
color:white;
border-radius:8px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<h2>Área: <span id="area"></span></h2>
<button onclick="logout()">Sair</button>
</div>

<div class="container" id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPx6l8JDNFfi70-DgRBvWk4mhuQz2kOWQ",
  authDomain: "preparatoriovirtualcomdelta.firebaseapp.com",
  projectId: "preparatoriovirtualcomdelta",
  storageBucket: "preparatoriovirtualcomdelta.appspot.com",
  messagingSenderId: "554101533814",
  appId: "1:554101533814:web:ed46583d92f4e14679c357"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const areaUser = localStorage.getItem("area");

// mostrar área
document.getElementById("area").innerText = areaUser;

// 🔐 PROTEÇÃO LOGIN
onAuthStateChanged(auth, async (user)=>{
if(!user){
window.location.href = "login.html";
return;
}

carregarAulas();
});

// 🚀 CARREGAR AULAS
async function carregarAulas(){

lista.innerHTML = "";

const snap = await getDocs(collection(db,"aulas"));

snap.forEach(docu=>{

const data = docu.data();

if(data.area !== areaUser) return;

const div = document.createElement("div");
div.className = "card";

let conteudo = `<h3>${data.titulo}</h3>`;

// 🎥 VIDEO (YouTube embed)
if(data.tipo === "video"){

conteudo += `
<iframe width="100%" height="250"
src="${data.url.replace("watch?v=","embed/")}"
frameborder="0" allowfullscreen></iframe>
`;

}

// 📄 PDF
if(data.tipo === "pdf"){

conteudo += `
<a class="download" href="${data.url}" target="_blank">
📄 Baixar PDF
</a>
`;

}

// 🖼 IMAGEM
if(data.tipo === "imagem"){

conteudo += `
<img src="${data.url}" width="100%">
<br>
<a class="download" href="${data.url}" download>
📥 Baixar imagem
</a>
`;

}

div.innerHTML = conteudo;
lista.appendChild(div);

});

}

// 🚪 LOGOUT
window.logout = function(){
signOut(auth);
localStorage.clear();
window.location.href = "login.html";
}

</script>

</body>
</html>
